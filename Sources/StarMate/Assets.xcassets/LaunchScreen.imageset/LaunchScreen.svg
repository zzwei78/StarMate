<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055CC;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGrad)"/>

  <!-- Satellite dish -->
  <g transform="translate(100, 100)">
    <!-- Dish support -->
    <rect x="-8" y="10" width="16" height="60" rx="4" fill="#FFFFFF"/>

    <!-- Dish -->
    <path d="M -45 -30 Q 0 -50 45 -30 L 30 20 Q 0 5 -30 20 Z" fill="#FFFFFF"/>

    <!-- Inner ring -->
    <ellipse cx="0" cy="-10" rx="28" ry="12" fill="none" stroke="#007AFF" stroke-width="3" opacity="0.5"/>

    <!-- Signal waves -->
    <path d="M 45 -45 Q 60 -40 65 -25" stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9"/>
    <path d="M 55 -55 Q 75 -48 82 -25" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 65 -65 Q 90 -55 100 -25" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- LNB -->
    <rect x="-10" y="-5" width="20" height="12" rx="3" fill="#333333"/>

    <!-- Base -->
    <ellipse cx="0" cy="72" rx="15" ry="6" fill="#FFFFFF" opacity="0.3"/>
  </g>

  <!-- Stars -->
  <polygon points="30,40 33,48 42,48 35,53 38,62 30,57 22,62 25,53 18,48 27,48" fill="#FFD700"/>
  <polygon points="165,100 167,105 173,105 168,108 170,113 165,110 160,113 162,108 157,105 163,105" fill="#FFD700" opacity="0.8"/>
</svg>
