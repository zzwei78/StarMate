<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007AFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0055CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="satelliteGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0E0E0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bgGradient)"/>

  <!-- Satellite dish base -->
  <ellipse cx="512" cy="750" rx="80" ry="30" fill="#FFFFFF" opacity="0.3"/>

  <!-- Satellite dish support -->
  <rect x="492" y="500" width="40" height="250" rx="10" fill="url(#satelliteGradient)"/>

  <!-- Satellite dish -->
  <path d="M 280 280 Q 512 200 744 280 L 620 520 Q 512 480 404 520 Z" fill="url(#satelliteGradient)"/>

  <!-- Dish inner ring -->
  <ellipse cx="512" cy="350" rx="150" ry="60" fill="none" stroke="#007AFF" stroke-width="8" opacity="0.5"/>

  <!-- Signal waves -->
  <path d="M 700 180 Q 800 200 820 300" stroke="#FFFFFF" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M 750 130 Q 880 160 910 300" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 800 80 Q 960 120 1000 300" stroke="#FFFFFF" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Star accent -->
  <polygon points="180,200 190,230 220,230 195,250 205,280 180,260 155,280 165,250 140,230 170,230" fill="#FFD700"/>
  <polygon points="820,500 828,520 850,520 832,532 840,552 820,540 800,552 808,532 790,520 812,520" fill="#FFD700" opacity="0.8"/>

  <!-- LNB (Low Noise Block) -->
  <rect x="482" y="380" width="60" height="40" rx="8" fill="#333333"/>
  <rect x="492" y="390" width="40" height="20" rx="4" fill="#666666"/>
</svg>
