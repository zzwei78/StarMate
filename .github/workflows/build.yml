name: Build StarMate iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Swift Package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build Package
        run: swift build

      - name: Build for iOS (Simulator)
        run: |
          swift build -Xswiftc "-sdk" -Xswiftc "`xcrun --sdk iphonesimulator --show-sdk-path`" -Xswiftc "-target" -Xswiftc "arm64-apple-ios17.0-simulator"

  # Xcode build job - requires proper project setup on a Mac
  xcode-build:
    name: Xcode Build (Manual)
    runs-on: macos-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Note
        run: |
          echo "::notice::To build with Xcode, open StarMate.xcodeproj in Xcode on a Mac"
          echo "The Swift Package sources are validated and ready for Xcode integration"
